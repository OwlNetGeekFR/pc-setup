name: Publier une version

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compiler OwlSetup
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./build.ps1 -AppVersion $version -Channel stable
      - name: Créer l'empreinte SHA-256
        shell: powershell
        run: |
          Copy-Item OwlSetup.exe PC-Setup.exe
          $hash = (Get-FileHash OwlSetup.exe -Algorithm SHA256).Hash
          "$hash  OwlSetup.exe" | Set-Content SHA256.txt -Encoding ascii
      - name: Créer la Release GitHub
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" OwlSetup.exe PC-Setup.exe SHA256.txt --title "OwlSetup ${{ github.ref_name }}" --generate-notes
