name: Publier une version

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "build.ps1"
      - "build-installer.ps1"
      - "installer/**"
      - "OwlSetupWebView.cs"
      - "index.html"
      - "app.js"
      - "styles.css"
  workflow_dispatch:
    inputs:
      version:
        description: "Version à publier (par exemple 3.5.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.version || 'tag' }}
  cancel-in-progress: false

jobs:
  validate-build:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Compiler OwlSetup
        shell: powershell
        run: ./build.ps1 -AppVersion 0.0.0 -Channel stable
      - name: Installer Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress --yes
      - name: Compiler et contrôler l'installateur
        shell: powershell
        run: |
          ./build-installer.ps1 -Version 0.0.0 -SkipApplicationBuild
          if ((Get-Item OwlSetup.exe).Length -lt 1MB) { throw "Binaire invalide." }
          if ((Get-Item artifacts/installer/OwlSetup-Setup.exe).Length -lt 1MB) { throw "Installateur invalide." }

  release:
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Valider la version et la branche
        shell: powershell
        run: |
          $version = "$env:RELEASE_VERSION".Trim().TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "La version doit utiliser le format majeur.mineur.correctif."
          }
          if ($env:GITHUB_EVENT_NAME -eq "push" -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "Le tag $env:GITHUB_REF_NAME ne correspond pas à la version $version."
          }
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and $env:GITHUB_REF_NAME -ne "main") {
            throw "Une publication manuelle doit être lancée depuis la branche main."
          }
          git fetch origin main --quiet
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Le commit à publier n'appartient pas à la branche main."
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compiler OwlSetup
        shell: powershell
        run: ./build.ps1 -AppVersion $env:RELEASE_VERSION -Channel stable

      - name: Vérifier le binaire
        shell: powershell
        run: |
          $binary = Get-Item OwlSetup.exe
          if ($binary.Length -lt 1MB) { throw "Le binaire généré est anormalement petit." }
          if ($binary.VersionInfo.FileVersion -ne "$env:RELEASE_VERSION.0") {
            throw "Version du fichier incorrecte : $($binary.VersionInfo.FileVersion)."
          }
          $signature = Get-AuthenticodeSignature OwlSetup.exe
          "### Vérification du binaire" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Version : $env:RELEASE_VERSION" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Taille : $([math]::Round($binary.Length / 1MB, 2)) Mo" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Signature : $($signature.Status)" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Installer Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress --yes

      - name: Compiler l'installateur utilisateur
        shell: powershell
        run: ./build-installer.ps1 -Version $env:RELEASE_VERSION -SkipApplicationBuild

      - name: Préparer et vérifier les fichiers publiés
        shell: powershell
        run: |
          Copy-Item OwlSetup.exe PC-Setup.exe
          Copy-Item artifacts/installer/OwlSetup-Setup.exe OwlSetup-Setup.exe
          $files = @("OwlSetup-Setup.exe", "OwlSetup.exe", "PC-Setup.exe")
          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file)) { throw "Fichier manquant : $file" }
            if ((Get-Item -LiteralPath $file).Length -lt 1MB) { throw "Fichier anormalement petit : $file" }
          }
          $checksums = $files | ForEach-Object {
            "$(Get-FileHash $_ -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $_"
          }
          $checksums | Set-Content SHA256.txt -Encoding ascii
          foreach ($file in $files) {
            if (-not (Select-String -Path SHA256.txt -SimpleMatch "  $file" -Quiet)) {
              throw "Empreinte absente pour $file."
            }
          }

      - name: Créer ou actualiser la Release GitHub
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @("OwlSetup-Setup.exe", "OwlSetup.exe", "PC-Setup.exe", "SHA256.txt")
          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = "Continue"
          gh release view "$env:RELEASE_TAG" --json tagName 2>$null | Out-Null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = $previousErrorActionPreference
          if ($releaseExists) {
            gh release upload "$env:RELEASE_TAG" @assets --clobber
            gh release edit "$env:RELEASE_TAG" --title "OwlSetup $env:RELEASE_TAG"
          } else {
            gh release create "$env:RELEASE_TAG" @assets --target "${{ github.sha }}" --title "OwlSetup $env:RELEASE_TAG" --generate-notes
          }

      - name: Contrôler la Release publiée
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $release = gh api "repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $required = @("OwlSetup-Setup.exe", "OwlSetup.exe", "PC-Setup.exe", "SHA256.txt")
          $published = @($release.assets | Select-Object -ExpandProperty name)
          $missing = @($required | Where-Object { $_ -notin $published })
          if ($missing.Count -gt 0) { throw "Fichiers absents de la Release : $($missing -join ', ')" }
          if ($release.draft -or $release.prerelease) { throw "La Release stable ne doit être ni brouillon ni préversion." }
          "- Release vérifiée : [$($release.tag_name)]($($release.html_url))" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
