name: Publier une version

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compiler PC Setup
        shell: powershell
        run: ./build.ps1
      - name: Créer l'empreinte SHA-256
        shell: powershell
        run: |
          $hash = (Get-FileHash PC-Setup.exe -Algorithm SHA256).Hash
          "$hash  PC-Setup.exe" | Set-Content SHA256.txt -Encoding ascii
      - name: Créer la Release GitHub
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" PC-Setup.exe SHA256.txt --title "PC Setup ${{ github.ref_name }}" --generate-notes
